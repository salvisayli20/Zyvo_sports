<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Zyvo Sports</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#001f54,#004aad,#87cefa);
    min-height:100vh;
}

/* NAVBAR */

header{
    background:#00153d;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 15px rgba(0,0,0,0.3);
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#87cefa;
}

/* MAIN */

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    padding:50px;
    flex-wrap:wrap;
}

/* FORM CARD */

.contact-form{
    background:white;
    width:500px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.contact-form h2{
    text-align:center;
    color:#001f54;
    margin-bottom:30px;
    font-size:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-weight:bold;
    color:#001f54;
    margin-bottom:8px;
}

input,
textarea{
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#004aad;
    box-shadow:0 0 10px rgba(0,74,173,.3);
}

textarea{
    height:150px;
    resize:none;
}

button{
    width:100%;
    padding:15px;
    background:linear-gradient(90deg,#001f54,#004aad);
    color:white;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

/* CONTACT CARD */

.contact-info{
    background:white;
    width:350px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.contact-info h2{
    color:#001f54;
    margin-bottom:20px;
}

.contact-box{
    background:#f3f8ff;
    padding:20px;
    border-left:5px solid #004aad;
    border-radius:10px;
    margin-bottom:20px;
}

.contact-box h3{
    color:#001f54;
    margin-bottom:10px;
}

.contact-box p{
    color:#444;
    line-height:1.6;
}

@media(max-width:900px){

    .container{
        flex-direction:column;
        align-items:center;
    }

    .contact-form,
    .contact-info{
        width:95%;
    }

    header{
        flex-direction:column;
    }

    nav{
        margin-top:15px;
    }
}

</style>
</head>

<body>

<header>

    <div class="logo">
        Zyvo Sports
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="product.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="order_summary.html">Orders</a>
    </nav>

</header>

<div class="container">

    <div class="contact-form">

        <h2>Contact Us</h2>

        <form>

            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Enter Your Name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter Your Email">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Write Your Message"></textarea>
            </div>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

    <div class="contact-info">

        <h2>Contact Information</h2>

        <div class="contact-box">
            <h3>Vihan Salvi</h3>
            <p>
                📞 9594526910<br>
                ✉️ vihan29@gmail.com
            </p>
        </div>

        <div class="contact-box">
            <h3>Sayli Salvi</h3>
            <p>
                📞 9594526279<br>
                ✉️ sayli20@gmail.com
            </p>
        </div>

    </div>

</div>

</body>
</html>
