<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvo Sports - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#001f54,#004aad,#87cefa);
    min-height:100vh;
}

/* NAVBAR */

header{
    background:#00153d;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 15px rgba(0,0,0,0.3);
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#87cefa;
}

/* LOGIN CARD */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

form{
    background:rgba(255,255,255,0.95);
    width:700px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#001f54;
    margin-bottom:30px;
    font-size:38px;
}

.form-group{
    display:flex;
    align-items:center;
    margin-bottom:25px;
}

label{
    width:180px;
    font-size:20px;
    font-weight:bold;
    color:#001f54;
}

input{
    flex:1;
    padding:15px;
    border:2px solid #d0d0d0;
    border-radius:10px;
    font-size:17px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#004aad;
    box-shadow:0 0 10px rgba(0,74,173,.3);
}

.button-area{
    text-align:center;
    margin-top:20px;
}

button{
    background:linear-gradient(90deg,#001f54,#004aad);
    color:white;
    border:none;
    padding:15px 50px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,74,173,0.4);
}

button:hover{
    transform:translateY(-3px);
}

.extra{
    text-align:center;
    margin-top:20px;
    color:#555;
}

.extra a{
    color:#004aad;
    text-decoration:none;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

    form{
        width:95%;
    }

    .form-group{
        flex-direction:column;
        align-items:flex-start;
    }

    label{
        margin-bottom:8px;
    }

    header{
        flex-direction:column;
    }

    nav{
        margin-top:15px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">ZYVO SPORTS</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="product.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">

<form id="loginForm">

<h2>Login Page</h2>

<div class="form-group">
<label>Username:</label>
<input type="text" id="username"
placeholder="Enter Username" required>
</div>

<div class="form-group">
<label>Phone Number:</label>
<input type="tel" id="phone"
placeholder="Enter Phone Number" required>
</div>

<div class="form-group">
<label>Email Address:</label>
<input type="email" id="email"
placeholder="Enter Email Address" required>
</div>

<div class="form-group">
<label>Address:</label>
<input type="text" id="text"
placeholder="Enter Your Address" required>
</div>

<div class="form-group">
<label>Pincode:</label>
<input type="text" id="pincode"
placeholder="Enter Pincode" required>
</div>

<div class="button-area">
<button type="submit">Continue</button>
</div>

<div class="extra">
Need help? <a href="contact.html">Contact Support</a>
</div>

</form>

</div>

<script>
document.getElementById("loginForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    window.location.href="order_summary.html";

});
</script>

</body>
</html>
