<!DOCTYPE html>
<html>
<head>
    <title>Order Summary</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#001f54,#004aad);
            min-height:100vh;
        }

        .navbar{
            background:#1e3a8a;
            padding:15px;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

        /* Order Container */
        .order-container{
            width:85%;
            max-width:1200px;
            margin:60px auto;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        /* Ordered Items */
        .order-item{
            background:#f7f9fc;
            border-left:6px solid #004aad;
            border-radius:15px;
            padding:25px;
            margin:25px 0;
            transition:0.3s;
        }

        .order-item:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,74,173,0.2);
        }

        /* Quantity Buttons */
        .qty-btn{
            width:45px;
            height:45px;
            border:none;
            background:#001f54;
            color:white;
            font-size:22px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .qty-btn:hover{
            background:#004aad;
        }

        .quantity{
            font-size:22px;
            font-weight:bold;
            margin:0 20px;
        }

        .place-btn{
            background:green;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        .popup{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
        }

        .popup-content{
            background:white;
            width:400px;
            margin:150px auto;
            padding:25px;
            border-radius:10px;
            text-align:center;
        }

        .popup-content h2{
            color:green;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="index.html">🏠 Home</a>
        <a href="product.html">🏏 Products</a>
        <a href="cart.html">🛒 Cart</a>
    </div>

    <!-- Order Container -->
    <div class="order-container">

        <h1>📦 Order Summary</h1>

        <!-- Products will appear here -->
        <div id="orderItems"></div>

        <hr>

        <h2>
            Total Amount: ₹<span id="grandTotal">0</span>
        </h2>

        <h3>Select Payment Method</h3>

        <label>
            <input type="radio"
                   name="payment"
                   value="Cash on Delivery"
                   checked>
            Cash on Delivery
        </label>

        <br><br>

        <label>
            <input type="radio"
                   name="payment"
                   value="Online Payment">
            Online Payment
        </label>

        <br><br>

        <button class="place-btn"
                onclick="placeOrder()">
            🛍️ Place Order
        </button>

    </div>

    <!-- Popup -->
    <div id="popup" class="popup">

        <div class="popup-content">

            <h2>🎉 Order Placed Successfully! 🎉</h2>

            <p>
                🛒 Thank you for shopping with us!<br><br>
                📦 Your order has been received.<br><br>
                🚚 It will be delivered soon.
            </p>

            <button class="place-btn"
                    onclick="closePopup()">
                ✅ OK
            </button>

        </div>

    </div>

    <script>

        let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

        let grandTotal = 0;

        function displayOrder(){

            let output = "";
            grandTotal = 0;

            if(cart.length === 0){

                output =
                "<h3>Your cart is empty!</h3>";
            }

            cart.forEach((item,index)=>{

                if(!item.quantity){
                    item.quantity = 1;
                }

                grandTotal +=
                item.price * item.quantity;

                output += `
                <div class="order-item">

                    <h3>${item.name}</h3>

                    <p>
                        Price: ₹${item.price}
                    </p>

                    <button
                        class="qty-btn"
                        onclick="decreaseQty(${index})">
                        -
                    </button>

                    <span class="quantity">
                        ${item.quantity}
                    </span>

                    <button
                        class="qty-btn"
                        onclick="increaseQty(${index})">
                        +
                    </button>

                    <p>
                        Subtotal:
                        ₹${item.price * item.quantity}
                    </p>

                </div>
                `;
            });

            document.getElementById(
                "orderItems"
            ).innerHTML = output;

            document.getElementById(
                "grandTotal"
            ).innerText = grandTotal;
        }

        function increaseQty(index){

            cart[index].quantity++;

            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );

            displayOrder();
        }

        function decreaseQty(index){

            if(cart[index].quantity > 1){

                cart[index].quantity--;

                localStorage.setItem(
                    "cart",
                    JSON.stringify(cart)
                );

                displayOrder();
            }
        }

        function placeOrder(){

            if(cart.length === 0){

                alert(
                    "Your cart is empty!"
                );

                return;
            }

            document.getElementById(
                "popup"
            ).style.display = "block";
        }

        function closePopup(){

            localStorage.removeItem(
                "cart"
            );

            window.location.href =
            "index.html";
        }

        displayOrder();

    </script>

</body>
</html>
